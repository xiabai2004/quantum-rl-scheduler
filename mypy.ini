[mypy]
python_version = 3.12
files = src, scripts, tests
explicit_package_bases = True
namespace_packages = True
show_error_codes = True
sqlite_cache = False
cache_dir = .mypy_cache_local

# The project intentionally keeps several optional runtime integrations
# importable without installing their heavy SDKs in local Mock mode.
ignore_missing_imports = True

[mypy-src.scheduler.agent]
ignore_errors = True

[mypy-src.quantum.annealing]
ignore_errors = True

[mypy-scripts.*]
ignore_errors = True
