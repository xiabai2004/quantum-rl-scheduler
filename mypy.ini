[mypy]
python_version = 3.12
files = src, scripts, tests
explicit_package_bases = True
namespace_packages = True
show_error_codes = True
sqlite_cache = False
cache_dir = .mypy_cache_local

# 第三方库（torch/sb3/gymnasium/cqlib 等）无 type stub，放宽缺失导入
ignore_missing_imports = True

# ===== 收紧类型检查（团队技术提升方案 v1 第一阶段）=====
# 所有函数必须有完整类型标注
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
# 返回 Any / 无用 ignore / 多余 cast / 严格相等
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
strict_equality = True

# ===== 过渡期：复杂模块逐步修复，暂保留宽松 =====
# agent.py（PPO/DQN + sb3 深度耦合）和 annealing.py（torch QUBO）类型复杂，
# 先要求 untyped defs，其他错误分批修复
[mypy-src.scheduler.agent]
ignore_errors = True

[mypy-src.quantum.annealing]
ignore_errors = True

[mypy-scripts.*]
ignore_errors = True
